name: 🐛 Bug Report
description: Report something that's broken or not working as expected
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting this! Describe **what you were doing**, not which service you think is at fault — the team will identify that from the logs.

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the k8shell platform does this relate to?
      options:
        - "Access — SSH Proxy"
        - "Access — API Server"
        - "Access — Console"
        - "Access — CLI"
        - "Core — Identity"
        - "Core — Authz"
        - "Core — Session"
        - "Core — Provisioner"
        - "Core — k8shelld"
        - "Security — SSH Shield"
        - "Security — nfgate"
        - "Security — Worktrace"
        - "Infra — Postgres"
        - "Infra — NATS"
        - "Infra — Vault"
        - "Infra — Registry"
        - "CI/CD — GitHub Actions Runners (ARC)"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear, concise description of the bug
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead
    validations:
      required: false

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Run '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Helm chart version, Kubernetes distribution/version, workspace image, browser if UI-related.
      placeholder: |
        - k8shell Helm chart version:
        - Values overrides (if any):
        - Kubernetes distribution and version:
        - Workspace image:
        - Browser (if UI-related):
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / screenshots
      description: |
        Paste logs or stack traces below (auto-formatted as code). For service logs: `kubectl logs <pod> -n <k8shell-namespace>`. For workspace logs: `kbox logs` or `kubectl logs <workspace-pod> -n <workspaces-namespace>`. Attach large files by dragging a `.txt` file onto the comment box.
      render: shell
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical — platform unusable / data loss
        - High — major feature broken, no workaround
        - Medium — workaround exists
        - Low — cosmetic / minor annoyance
    validations:
      required: true
