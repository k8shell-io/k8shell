name: ✨ Feature Request
description: Suggest an idea or improvement for the k8shell platform
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the platform does this relate to?
      options:
        - "Access — SSH Proxy"
        - "Access — API Server"
        - "Access — Console"
        - "Access — CLI"
        - "Core — Identity"
        - "Core — Authz"
        - "Core — Session"
        - "Core — Provisioner"
        - "Core — k8shelld"
        - "Security — SSH Shield"
        - "Security — nfgate"
        - "Security — Worktrace"
        - "Infra — Postgres"
        - "Infra — NATS"
        - "Infra — Vault"
        - "Infra — Registry"
        - "CI/CD — GitHub Actions Runners (ARC)"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the pain point or limitation you're running into
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or other approaches you've tried
    validations:
      required: false

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How many users or workflows does this affect?
      options:
        - Critical — blocks core workflow for many users
        - High — significant pain point, no good workaround
        - Medium — useful improvement, workaround exists
        - Low — nice to have / polish
    validations:
      required: true
