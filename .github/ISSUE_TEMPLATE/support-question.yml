name: ❓ Support / Question
description: Ask a question or get help with something that isn't a bug or feature request
title: "[Support]: "
labels: ["question", "needs-triage"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Affected area
      description: Which part of the platform is this about?
      options:
        - "Access — SSH Proxy"
        - "Access — API Server"
        - "Access — Console"
        - "Access — CLI"
        - "Core — Identity"
        - "Core — Authz"
        - "Core — Session"
        - "Core — Provisioner"
        - "Core — k8shelld"
        - "Security — SSH Shield"
        - "Security — nfgate"
        - "Security — Worktrace"
        - "Infra — Postgres"
        - "Infra — NATS"
        - "Infra — Vault"
        - "Infra — Registry"
        - "CI/CD — GitHub Actions Runners (ARC)"
        - "Not sure"
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Your question
      description: What do you need help with?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help us answer faster (what you've already tried, links, screenshots)
    validations:
      required: false
